<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Carnet de Recettes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --light: #f5f7fa;
            --border: #e0e6ed;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--light);
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { opacity: 0.9; font-size: 1.1em; }

        .form-section, .filter-section, .export-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .form-section h2 { margin-bottom: 20px; color: var(--primary); }

        .form-group { display: flex; gap: 10px; margin-bottom: 20px; }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--primary); }

        button {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        button:hover { background: var(--primary-dark); }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        button.secondary { background: #f0f0f0; color: #333; }
        button.secondary:hover { background: #e0e0e0; }
        button.danger { background: #f8d7da; color: #721c24; }
        button.danger:hover { background: #f5c6cb; }

        .status {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }

        .loading { display: none; text-align: center; padding: 20px; color: var(--primary); }
        .loading.show { display: block; }

        .filter-section {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .filter-section label { font-weight: 500; }
        select {
            padding: 8px 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 1em;
        }

        .recipe-list { display: grid; gap: 20px; margin-bottom: 30px; }

        .recipe-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-left: 4px solid var(--primary);
            transition: box-shadow 0.3s, background 0.2s;
        }
        .recipe-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .recipe-card.selected {
            background: rgba(102, 126, 234, 0.05);
            border-left-color: var(--primary-dark);
        }

        .card-left { display: flex; gap: 15px; flex: 1; align-items: flex-start; }

        .checkbox { width: 20px; height: 20px; cursor: pointer; margin-top: 4px; flex-shrink: 0; }

        .recipe-info h3 { font-size: 1.3em; margin-bottom: 8px; color: var(--primary); }
        .recipe-meta { font-size: 0.9em; color: #666; margin-bottom: 10px; }

        .recipe-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
            align-items: center;
        }
        .tag {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.85em;
        }
        .tag-input {
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9em;
            width: 130px;
        }

        .recipe-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
            margin-left: 20px;
            flex-shrink: 0;
        }
        .recipe-actions button { padding: 8px 16px; font-size: 0.9em; }

        .export-section { text-align: center; }
        .export-section h2 { margin-bottom: 20px; color: var(--primary); }
        .export-stats { margin-bottom: 20px; font-size: 1.1em; color: #666; }
        .export-stats strong { color: var(--primary); font-size: 1.3em; }
        .export-section button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 14px 32px;
            font-size: 1.05em;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .empty-state div { font-size: 3em; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <header>
        <h1>📚 Mon Carnet de Recettes</h1>
        <p>Importe depuis TikTok ou Instagram, classe et exporte en PDF</p>
    </header>

    <!-- Import -->
    <div class="form-section">
        <h2>➕ Importer une recette</h2>
        <div id="status" class="status"></div>
        <div class="form-group">
            <input
                type="text"
                id="urlInput"
                placeholder="Colle l'URL TikTok ou Instagram ici..."
                autocomplete="off"
            >
            <button onclick="importRecipe()">Importer</button>
	    <button onclick="openNewRecipe()" style="
    padding:12px 24px;
    background:linear-gradient(135deg, #43e97b, #38f9d7);
    color:white; border:none; border-radius:8px;
    font-size:1em; font-weight:600; cursor:pointer;
">
    ✏️ Nouvelle recette
</button>
        </div>
        <div class="loading" id="importLoading">⏳ Extraction en cours...</div>
    </div>

    <!-- Filtres -->
    <div class="filter-section">
        <label for="tagFilter">Filtrer par tag :</label>
        <select id="tagFilter" onchange="loadRecipes()">
            <option value="">— Tous les tags —</option>
        </select>
        <button onclick="selectAll()" class="secondary">✓ Tout sélectionner</button>
        <button onclick="deselectAll()" class="secondary">✗ Tout déselectionner</button>
    </div>

    <!-- Liste des recettes -->
    <div id="recipeList" class="recipe-list"></div>

    <!-- Export PDF -->
    <div class="export-section">
        <h2>📥 Exporter en PDF</h2>
        <div class="export-stats">
            <strong id="selectedCount">0</strong> recette(s) sélectionnée(s)
        </div>
        <button id="exportBtn" onclick="exportPdf()" disabled>
            📥 Télécharger le PDF
        </button>
    </div>

</div>

<script>
    const API_BASE = window.location.origin;
    const selectedRecipes = new Set();

    // -------- Import --------
    async function importRecipe() {
        const url = document.getElementById('urlInput').value.trim();
        const loading = document.getElementById('importLoading');

        if (!url) { showStatus('Veuillez entrer une URL', 'error'); return; }

        loading.classList.add('show');
        clearStatus();

        try {
            const response = await fetch(`${API_BASE}/extract`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            const data = await response.json();

            if (response.status === 409) {
                showStatus('⚠️ Cette recette est déjà importée', 'error');
            } else if (!response.ok) {
                showStatus(`Erreur : ${data.detail}`, 'error');
            } else {
                showStatus(`✓ Recette "${data.title}" importée !`, 'success');
                document.getElementById('urlInput').value = '';
                loadRecipes();
            }
        } catch (err) {
            showStatus(`Erreur réseau : ${err.message}`, 'error');
        } finally {
            loading.classList.remove('show');
        }
    }

    // -------- Load --------
    async function loadRecipes() {
        const tag = document.getElementById('tagFilter').value;
        const url = tag ? `${API_BASE}/recipes?tag=${encodeURIComponent(tag)}` : `${API_BASE}/recipes`;

        try {
            const response = await fetch(url);
            const recipes = await response.json();
            displayRecipes(recipes);
            loadTags();
        } catch (err) {
            console.error('Erreur:', err);
        }
    }

    function displayRecipes(recipes) {
        const container = document.getElementById('recipeList');

        if (recipes.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div>🍽️</div>
                    <p>Aucune recette pour le moment.<br>Ajoute ta première recette en collant une URL ci-dessus !</p>
                </div>`;
            return;
        }

        container.innerHTML = recipes.map(r => `
            <div class="recipe-card ${selectedRecipes.has(r.id) ? 'selected' : ''}" id="card${r.id}">
                <div class="card-left">
                    <input
                        type="checkbox"
                        class="checkbox"
                        ${selectedRecipes.has(r.id) ? 'checked' : ''}
                        onchange="toggleRecipe(${r.id})"
                    >
                    <div class="recipe-info">
                        <h3>${r.title}</h3>
                        <div class="recipe-meta">
                            👥 ${r.servings} portions
                            ${r.prep_time ? `· ⏱️ ${r.prep_time}` : ''}
                            · ${new Date(r.created_at).toLocaleDateString('fr-FR')}
                        </div>
                        <div class="recipe-tags">
                            ${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            <input
                                type="text"
                                class="tag-input"
                                placeholder="+ Ajouter un tag"
                                onkeypress="if(event.key==='Enter' && this.value.trim()) { addTag(${r.id}, this.value); this.value=''; }"
                            >
                        </div>
                    </div>
                </div>
            <div class="recipe-actions">
    <button onclick="openRecipe(${r.id})" style="background:var(--primary); color:white; padding:8px 16px; font-size:0.9em;">👁 Voir</button>
    <button class="danger" onclick="deleteRecipe(${r.id})">🗑️ Supprimer</button>
</div>
					    </div>
        `).join('');
    }

    async function loadTags() {
        try {
            const response = await fetch(`${API_BASE}/tags`);
            const tags = await response.json();
            const current = document.getElementById('tagFilter').value;
            const select = document.getElementById('tagFilter');
            select.innerHTML = '<option value="">— Tous les tags —</option>' +
                tags.map(t => `<option value="${t.name}" ${t.name === current ? 'selected' : ''}>${t.name}</option>`).join('');
        } catch (err) {
            console.error('Erreur tags:', err);
        }
    }

    // -------- Tags --------
    async function addTag(recipeId, tagName) {
        try {
            await fetch(`${API_BASE}/recipes/${recipeId}/tags`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tag: tagName.toLowerCase().trim() })
            });
            loadRecipes();
        } catch (err) {
            console.error('Erreur:', err);
        }
    }

    // -------- Sélection --------
    function toggleRecipe(id) {
        const card = document.getElementById(`card${id}`);
        if (selectedRecipes.has(id)) {
            selectedRecipes.delete(id);
            card.classList.remove('selected');
        } else {
            selectedRecipes.add(id);
            card.classList.add('selected');
        }
        updateExportButton();
    }

    function selectAll() {
        document.querySelectorAll('.recipe-card').forEach(el => {
            const id = parseInt(el.id.replace('card', ''));
            selectedRecipes.add(id);
            el.classList.add('selected');
            el.querySelector('.checkbox').checked = true;
        });
        updateExportButton();
    }

    function deselectAll() {
        selectedRecipes.clear();
        document.querySelectorAll('.recipe-card').forEach(el => {
            el.classList.remove('selected');
            el.querySelector('.checkbox').checked = false;
        });
        updateExportButton();
    }

    function updateExportButton() {
        const count = selectedRecipes.size;
        document.getElementById('selectedCount').textContent = count;
        document.getElementById('exportBtn').disabled = count === 0;
    }

    // -------- Suppression --------
    async function deleteRecipe(id) {
        if (!confirm('Supprimer cette recette ?')) return;
        try {
            await fetch(`${API_BASE}/recipes/${id}`, { method: 'DELETE' });
            selectedRecipes.delete(id);
            loadRecipes();
            updateExportButton();
        } catch (err) {
            console.error('Erreur:', err);
        }
    }

    // -------- Export PDF --------
    async function exportPdf() {
        if (selectedRecipes.size === 0) return;

        const btn = document.getElementById('exportBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Génération...';

        try {
            const response = await fetch(`${API_BASE}/export-pdf`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ recipe_ids: Array.from(selectedRecipes) })
            });

            if (!response.ok) {
                const error = await response.json();
                showStatus(`Erreur PDF : ${error.detail}`, 'error');
                return;
            }

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Carnet_Recettes_${new Date().toISOString().split('T')[0]}.pdf`;
            a.click();
            URL.revokeObjectURL(url);

            showStatus('✓ PDF téléchargé !', 'success');
        } catch (err) {
            showStatus(`Erreur : ${err.message}`, 'error');
        } finally {
            btn.disabled = selectedRecipes.size === 0;
            btn.textContent = '📥 Télécharger le PDF';
        }
    }

    // -------- Utils --------
    function showStatus(msg, type) {
        const s = document.getElementById('status');
        s.textContent = msg;
        s.className = `status ${type}`;
    }
    function clearStatus() {
        const s = document.getElementById('status');
        s.style.display = 'none';
        s.className = 'status';
    }

    // -------- Init --------
    window.addEventListener('load', loadRecipes);
    document.getElementById('urlInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') importRecipe();
    });

let currentRecipeId = null;

// -------- Ouvrir la modale --------
async function openRecipe(id) {
    currentRecipeId = id;
    const response = await fetch(`${API_BASE}/recipes/${id}`);
    const recipe = await response.json();

    // Remplir les champs
    document.getElementById('modal-title-display').textContent = recipe.title;
    document.getElementById('edit-title').value = recipe.title;
    document.getElementById('edit-servings').value = recipe.servings;
    document.getElementById('edit-prep-time').value = recipe.prep_time || '';

    // Image
    const img = document.getElementById('modal-image');
    const noImg = document.getElementById('modal-no-image');
    if (recipe.image_url) {
        img.src = recipe.image_url;
        img.style.display = 'block';
        noImg.style.display = 'none';
    } else {
        img.style.display = 'none';
        noImg.style.display = 'flex';
    }

    // Ingrédients
    renderIngredients(recipe.ingredients);

    // Étapes
    renderSteps(recipe.steps);

    // Afficher la modale
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('recipe-modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('recipe-modal').style.display = 'none';
    currentRecipeId = null;

    // Remet le texte du bouton par défaut
    const saveBtn = document.querySelector('#recipe-modal button[onclick="saveRecipe()"]');
    if (saveBtn) saveBtn.textContent = '💾 Enregistrer';
}

// -------- Rendu ingrédients --------
function renderIngredients(ingredients) {
    const container = document.getElementById('edit-ingredients');
    container.innerHTML = ingredients.map((ing, i) => `
        <div style="display:flex; gap:8px; margin-bottom:8px; align-items:center;" id="ing-row-${i}">
            <input type="text" value="${ing.quantity || ''}" placeholder="Qté"
                style="width:70px; padding:8px; border:2px solid var(--border); border-radius:6px;"
                oninput="updateIngredient(${i}, 'quantity', this.value)">
            <input type="text" value="${ing.unit || ''}" placeholder="Unité"
                style="width:80px; padding:8px; border:2px solid var(--border); border-radius:6px;"
                oninput="updateIngredient(${i}, 'unit', this.value)">
            <input type="text" value="${ing.name || ''}" placeholder="Ingrédient"
                style="flex:1; padding:8px; border:2px solid var(--border); border-radius:6px;"
                oninput="updateIngredient(${i}, 'name', this.value)">
            <button onclick="removeIngredient(${i})" class="danger" style="padding:8px 10px; font-size:0.85em;">✕</button>
        </div>
    `).join('');
}

let currentIngredients = [];
let currentSteps = [];

async function openRecipe(id) {
    currentRecipeId = id;
    const response = await fetch(`${API_BASE}/recipes/${id}`);
    const recipe = await response.json();

    currentIngredients = [...recipe.ingredients];
    currentSteps = [...recipe.steps];

    document.getElementById('modal-title-display').textContent = recipe.title;
    document.getElementById('edit-title').value = recipe.title;
    document.getElementById('edit-servings').value = recipe.servings;
    document.getElementById('edit-prep-time').value = recipe.prep_time || '';

    const img = document.getElementById('modal-image');
    const noImg = document.getElementById('modal-no-image');
    if (recipe.image_url) {
        img.src = recipe.image_url;
        img.style.display = 'block';
        noImg.style.display = 'none';
    } else {
        img.style.display = 'none';
        noImg.style.display = 'flex';
    }

    renderIngredients(currentIngredients);
    renderSteps(currentSteps);

    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('recipe-modal').style.display = 'block';
}

function updateIngredient(i, field, value) {
    currentIngredients[i][field] = value;
}

function removeIngredient(i) {
    currentIngredients.splice(i, 1);
    renderIngredients(currentIngredients);
}

function addIngredient() {
    currentIngredients.push({ name: '', quantity: '', unit: '' });
    renderIngredients(currentIngredients);
}

// -------- Rendu étapes --------
function renderSteps(steps) {
    const container = document.getElementById('edit-steps');
    container.innerHTML = steps.map((step, i) => `
        <div style="display:flex; gap:8px; margin-bottom:8px; align-items:flex-start;">
            <span style="
                min-width:28px; height:28px; background:var(--primary); color:white;
                border-radius:50%; display:flex; align-items:center; justify-content:center;
                font-weight:bold; font-size:0.85em; margin-top:8px;
            ">${i + 1}</span>
            <textarea rows="2"
                style="flex:1; padding:8px; border:2px solid var(--border); border-radius:6px; resize:vertical; font-family:inherit;"
                oninput="updateStep(${i}, this.value)">${step}</textarea>
            <button onclick="removeStep(${i})" class="danger" style="padding:8px 10px; font-size:0.85em; margin-top:4px;">✕</button>
        </div>
    `).join('');
}

function updateStep(i, value) {
    currentSteps[i] = value;
}

function removeStep(i) {
    currentSteps.splice(i, 1);
    renderSteps(currentSteps);
}

function addStep() {
    currentSteps.push('');
    renderSteps(currentSteps);
}

// -------- Sauvegarder --------
async function saveRecipe() {
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '⏳ Sauvegarde...';

    const payload = {
        title: document.getElementById('edit-title').value || 'Nouvelle recette',
        servings: parseInt(document.getElementById('edit-servings').value) || 4,
        prep_time: document.getElementById('edit-prep-time').value || null,
        ingredients: currentIngredients.filter(i => i.name.trim() !== ''),
        steps: currentSteps.filter(s => s.trim() !== ''),
    };

    try {
        if (currentRecipeId) {
            // Modification
            await fetch(`${API_BASE}/recipes/${currentRecipeId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            showStatus('✓ Recette sauvegardée !', 'success');
        } else {
            // Création
            await fetch(`${API_BASE}/recipes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            showStatus('✓ Recette créée !', 'success');
        }

        closeModal();
        loadRecipes();

    } catch (err) {
        alert(`Erreur : ${err.message}`);
    } finally {
        btn.disabled = false;
        btn.textContent = currentRecipeId ? '💾 Enregistrer' : '✏️ Créer la recette';
    }
}


// -------- Upload image --------
async function uploadImage(input) {
    if (!input.files[0]) return;

    const formData = new FormData();
    formData.append('file', input.files[0]);

    try {
        await fetch(`${API_BASE}/recipes/${currentRecipeId}/image`, {
            method: 'POST',
            body: formData
        });

        // Mettre à jour l'aperçu
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('modal-image');
            img.src = e.target.result;
            img.style.display = 'block';
            document.getElementById('modal-no-image').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
        showStatus('✓ Image mise à jour !', 'success');
    } catch (err) {
        alert(`Erreur upload : ${err.message}`);
    }
}

// -------- Regénérer image --------
async function regenerateImage() {
    const title = document.getElementById('edit-title').value;
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '⏳';

    try {
        // Appelle l'extraction image directement
        const response = await fetch(`${API_BASE}/recipes/${currentRecipeId}/regenerate-image`, {
            method: 'POST'
        });
        const data = await response.json();

        if (data.image_url) {
            const img = document.getElementById('modal-image');
            img.src = data.image_url;
            img.style.display = 'block';
            document.getElementById('modal-no-image').style.display = 'none';
            showStatus('✓ Image regénérée !', 'success');
        }
    } catch (err) {
        alert(`Erreur : ${err.message}`);
    } finally {
        btn.disabled = false;
        btn.textContent = '🔄 Regénérer';
    }
}

function openNewRecipe() {
    currentRecipeId = null;  // null = création, pas édition
    currentIngredients = [];
    currentSteps = [];

    // Vide tous les champs
    document.getElementById('modal-title-display').textContent = 'Nouvelle recette';
    document.getElementById('edit-title').value = '';
    document.getElementById('edit-servings').value = 4;
    document.getElementById('edit-prep-time').value = '';

    // Pas d'image
    document.getElementById('modal-image').style.display = 'none';
    document.getElementById('modal-no-image').style.display = 'flex';

    // Un ingrédient et une étape vides pour démarrer
    addIngredient();
    addStep();

    // Change le bouton Enregistrer en Créer
    const saveBtn = document.querySelector('#recipe-modal button[onclick="saveRecipe()"]');
    saveBtn.textContent = '✏️ Créer la recette';

    // Affiche la modale
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('recipe-modal').style.display = 'block';
}

</script>
<!-- ══════════════ MODALE ÉDITION ══════════════ -->
<div id="modal-overlay" onclick="closeModal()" style="
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.5); z-index:100;
    justify-content:center; align-items:center;
"></div>

<div id="recipe-modal" style="
    display:none; position:fixed;
    top:50%; left:50%; transform:translate(-50%,-50%);
    background:white; border-radius:16px;
    width:90%; max-width:750px; max-height:90vh;
    overflow-y:auto; padding:40px; z-index:101;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
">
    <button onclick="closeModal()" style="
        position:absolute; top:15px; right:15px;
        background:#f0f0f0; border:none; border-radius:50%;
        width:36px; height:36px; font-size:1.2em; cursor:pointer;
    ">✕</button>

    <h2 id="modal-title-display" style="color:var(--primary); margin-bottom:20px; font-size:1.8em;"></h2>

    <!-- Image -->
    <div style="margin-bottom:25px;">
        <div style="position:relative; display:inline-block; width:100%;">
            <img id="modal-image" src="" alt=""
                style="width:100%; height:220px; object-fit:cover; border-radius:10px; display:none;">
            <div id="modal-no-image" style="
                width:100%; height:220px; background:#f0f0f0; border-radius:10px;
                display:flex; align-items:center; justify-content:center; color:#999;
            ">Pas d'image</div>
        </div>
        <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
            <label style="
                padding:8px 16px; background:var(--primary); color:white;
                border-radius:8px; cursor:pointer; font-size:0.9em; font-weight:600;
            ">
                📷 Changer l'image
                <input type="file" id="image-upload" accept="image/*"
                    onchange="uploadImage(this)" style="display:none;">
            </label>
            <button onclick="regenerateImage()" class="secondary" style="padding:8px 16px; font-size:0.9em;">
                🔄 Regénérer
            </button>
        </div>
    </div>

    <!-- Infos de base -->
    <div style="display:flex; gap:15px; margin-bottom:20px;">
        <div style="flex:2;">
            <label style="font-weight:600; color:#555; display:block; margin-bottom:5px;">Titre</label>
            <input type="text" id="edit-title" style="width:100%; padding:10px; border:2px solid var(--border); border-radius:8px; font-size:1em;">
        </div>
        <div style="flex:1;">
            <label style="font-weight:600; color:#555; display:block; margin-bottom:5px;">Portions</label>
            <input type="number" id="edit-servings" min="1" style="width:100%; padding:10px; border:2px solid var(--border); border-radius:8px; font-size:1em;">
        </div>
        <div style="flex:1;">
            <label style="font-weight:600; color:#555; display:block; margin-bottom:5px;">Temps</label>
            <input type="text" id="edit-prep-time" placeholder="30 min" style="width:100%; padding:10px; border:2px solid var(--border); border-radius:8px; font-size:1em;">
        </div>
    </div>

    <!-- Ingrédients -->
    <div style="margin-bottom:25px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <label style="font-weight:600; color:#555; font-size:1.1em;">🧂 Ingrédients</label>
            <button onclick="addIngredient()" class="secondary" style="padding:6px 14px; font-size:0.85em;">+ Ajouter</button>
        </div>
        <div id="edit-ingredients"></div>
    </div>

    <!-- Étapes -->
    <div style="margin-bottom:30px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <label style="font-weight:600; color:#555; font-size:1.1em;">👨‍🍳 Étapes</label>
            <button onclick="addStep()" class="secondary" style="padding:6px 14px; font-size:0.85em;">+ Ajouter</button>
        </div>
        <div id="edit-steps"></div>
    </div>

    <!-- Boutons -->
    <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button onclick="closeModal()" class="secondary">Annuler</button>
        <button onclick="saveRecipe()" style="padding:12px 28px; background:linear-gradient(135deg,var(--primary),var(--primary-dark));">
            💾 Enregistrer
        </button>
    </div>
</div>

</body>
</html>
